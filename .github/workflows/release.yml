name: Release

# Fires only on a version tag (e.g. v0.1.0). Publishes three independent artifacts:
#   1. the PyPI package (Trusted Publishing via OIDC — no stored token),
#   2. a multi-arch container image to GHCR (linux/amd64 + linux/arm64),
#   3. a GitHub Release with the changelog notes.
# None of this runs on ordinary pushes, and none of it flips repo visibility.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  # ---- gate: the suite must pass before anything is published ----
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,brick]
      - run: pytest -q

  # ---- PyPI via Trusted Publishing (OIDC; no API token stored) ----
  pypi:
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write          # required for Trusted Publishing
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # ---- multi-arch image to GHCR ----
  image:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # push to ghcr.io
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/camber
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - name: Build and push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---- GitHub Release with changelog notes ----
  release:
    needs: [pypi, image]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "CAMBER ${GITHUB_REF_NAME}" \
            --notes "See CHANGELOG.md for the ${GITHUB_REF_NAME} changes."
